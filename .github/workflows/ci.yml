name: ci

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile scripts
        run: |
          python -m py_compile scripts/render_bundle.py
          python -m py_compile scripts/render_mockups.py
          python -m py_compile scripts/template_rewriter.py
          python -m py_compile scripts/smoke_test.py

      - name: Run smoke test
        run: python scripts/smoke_test.py
